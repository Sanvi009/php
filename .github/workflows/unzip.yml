name: Unzip uploaded file

on:
  push:
    branches: [ "main" ]

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip file
        run: |
          unzip upload.zip -d extracted
          rm upload.zip

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "auto-unzip upload.zip" || exit 0
          git push
